name: Rails releaser tests

on:
  pull_request:
    paths:
    - "tools/releaser/**"
  push:
    paths:
    - "tools/releaser/**"

permissions:
  contents: read

jobs:
  releaser_tests:
    name: releaser tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: ruby
      - name: Bundle install
        run: bundle install
        working-directory: tools/releaser
      - run: bundle exec rake
        working-directory: tools/releaser
